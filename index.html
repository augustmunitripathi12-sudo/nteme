<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Multiplayer Pixel RPG</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  overflow: hidden;
  background: #0d0d0d;
  font-family: 'Segoe UI', Arial, sans-serif;
  height: 100vh;
  width: 100vw;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#game-wrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  background: #1a1a1a;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}

#start-screen {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #1e1e1e;
  padding: 35px 30px;
  border-radius: 16px;
  color: white;
  text-align: center;
  z-index: 100;
  min-width: 320px;
  border: 1px solid #333;
  box-shadow: 0 20px 60px rgba(0,0,0,0.9);
}

#start-screen h2 {
  margin-bottom: 20px;
  font-size: 24px;
  letter-spacing: 1px;
}

.char-select {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}

.char-option {
  cursor: pointer;
  padding: 10px;
  border-radius: 12px;
  border: 3px solid transparent;
  background: #2a2a2a;
  transition: all 0.15s ease;
  min-width: 100px;
}

.char-option:hover {
  background: #333;
  transform: translateY(-2px);
}

.char-option.selected {
  border-color: #4ade80;
  background: #223322;
}

.char-option img {
  display: block;
  margin: 0 auto 8px;
  width: 64px;
  height: auto;
  image-rendering: pixelated;
}

.char-option span {
  font-size: 13px;
  color: #ccc;
}

#nameInput {
  padding: 12px;
  width: 240px;
  margin-top: 10px;
  border: 2px solid #444;
  border-radius: 8px;
  background: #2a2a2a;
  color: white;
  font-size: 16px;
  text-align: center;
  outline: none;
  transition: border-color 0.2s;
}

#nameInput:focus {
  border-color: #4ade80;
}

#nameInput.error {
  border-color: #ff4444;
  animation: shake 0.3s ease;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

#startBtn {
  margin-top: 18px;
  padding: 12px 36px;
  background: #4ade80;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  color: #0d1f0d;
  transition: all 0.15s;
}

#startBtn:disabled {
  background: #555;
  color: #aaa;
  cursor: not-allowed;
  transform: none !important;
}

#startBtn:hover:not(:disabled) {
  background: #22c55e;
  transform: scale(1.05);
}

#startBtn:active:not(:disabled) {
  transform: scale(0.98);
}

#instructions {
  margin-top: 18px;
  font-size: 12px;
  color: #888;
  line-height: 1.6;
}

#chat {
  position: absolute;
  left: 12px;
  bottom: 12px;
  width: 320px;
  max-width: calc(100vw - 160px);
  background: rgba(10,10,10,0.92);
  padding: 12px;
  border-radius: 12px;
  display: none;
  z-index: 50;
  border: 1px solid #333;
}

#messages {
  height: 160px;
  overflow-y: auto;
  color: white;
  margin-bottom: 10px;
  font-size: 13px;
  line-height: 1.5;
  word-break: break-word;
}

#messages::-webkit-scrollbar { width: 6px; }
#messages::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

#chatInput {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #444;
  background: #222;
  color: white;
  font-size: 13px;
  outline: none;
}

#chatInput:focus {
  border-color: #4ade80;
}

#chat-hint {
  position: absolute;
  left: 12px;
  bottom: 12px;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  display: none;
  z-index: 49;
  pointer-events: none;
}

#mobile-controls {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: none;
  z-index: 999;
}

.control-row {
  display: flex;
  justify-content: center;
}

.ctrl {
  width: 65px;
  height: 65px;
  margin: 4px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.15);
  color: white;
  font-size: 26px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  touch-action: manipulation;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s;
}

.ctrl:active, .ctrl.pressed {
  background: #4ade80;
  color: #111;
}

#player-count {
  position: absolute;
  top: 12px;
  right: 12px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  z-index: 40;
  display: none;
}

@media (max-width: 900px) {
  #mobile-controls { display: block; }
  #chat { width: calc(100vw - 160px); left: 10px; bottom: 10px; }
  #chat-hint { bottom: 100px; }
}

@media (max-width: 600px) {
  .ctrl { width: 55px; height: 55px; font-size: 22px; }
  #start-screen { min-width: 280px; padding: 25px 20px; }
}
</style>
</head>

<body>

<div id="game-wrapper">
  <canvas id="game" width="800" height="600"></canvas>
</div>

<div id="start-screen">
  <h2>Choose Character</h2>
  <div class="char-select">
    <div class="char-option selected" data-char="original" onclick="selectChar(this)">
      <img src="frontwalk_1.png" alt="Black Suit">
      <span>Black Suit</span>
    </div>
    <div class="char-option" data-char="blue" onclick="selectChar(this)">
      <img src="bluefront1.png" alt="Blue Vest">
      <span>Blue Vest</span>
    </div>
  </div>
  <input id="nameInput" maxlength="15" placeholder="Enter your name" autocomplete="off" spellcheck="false">
  <br>
  <button id="startBtn" onclick="startGame()" disabled>Loading sprites...</button>
  <div id="instructions">
    Desktop: <b>WASD</b> or <b>Arrow Keys</b> to move<br>
    Mobile: Use the on-screen D-Pad<br>
    <b>Enter</b> to open chat
  </div>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="chatInput" placeholder="Type message..." autocomplete="off" spellcheck="false">
</div>

<div id="chat-hint">Press Enter to chat</div>

<div id="mobile-controls">
  <div class="control-row">
    <button class="ctrl" id="up">&#9650;</button>
  </div>
  <div class="control-row">
    <button class="ctrl" id="left">&#9664;</button>
    <button class="ctrl" id="down">&#9660;</button>
    <button class="ctrl" id="right">&#9654;</button>
  </div>
</div>

<div id="player-count">Players online: 1</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ========== SETUP ========== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const socket = io();
const keys = {};

const SPRITE_WIDTH = 64;
const SPRITE_HEIGHT = 160;
const MOVE_SPEED = 2.6;
const FRAME_DELAY = 7;
const GROUND_OFFSET = 64;
const CANVAS_W = 800;
const CANVAS_H = 600;

let animationTimer = 0;
let chatFocused = false;
let gameStarted = false;
let imagesReady = false;

/* ========== IMAGE CACHE ========== */
const imageCache = {};
const processedCache = {};

function getImage(src) {
  return imageCache[src] || null;
}

function makeBlackTransparent(img) {
  if (!img || !img.complete || img.naturalWidth === 0) return null;
  if (processedCache[img.src]) return processedCache[img.src];

  const w = img.naturalWidth || SPRITE_WIDTH;
  const h = img.naturalHeight || SPRITE_HEIGHT;
  const off = document.createElement("canvas");
  off.width = w;
  off.height = h;
  const c = off.getContext("2d");
  c.drawImage(img, 0, 0);

  const imageData = c.getImageData(0, 0, w, h);
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i] < 12 && d[i+1] < 12 && d[i+2] < 12) {
      d[i+3] = 0;
    }
  }
  c.putImageData(imageData, 0, 0);
  processedCache[img.src] = off;
  return off;
}

/* ========== CHARACTERS ========== */
const characters = {
  original: {
    front: ["frontwalk_1.png","frontwalk_2.png","frontwalk_3.png","frontwalk_4.png"],
    back:  ["backwalk_1.png","backwalk_2.png","backwalk_3.png","backwalk_4.png"],
    side:  ["rightwalk_1.png","rightwalk_2.png","rightwalk_3.png","rightwalk_4.png"]
  },
  blue: {
    front: ["bluefront1.png","bluefront2.png","bluefront3.png","bluefront4.png"],
    back:  ["blueback1.png","blueback2.png","blueback3.png","blueback4.png"],
    side:  ["blueright1.png","blueright2.png","blueright3.png","blueright4.png"]
  }
};

/* ========== PRELOAD ALL IMAGES ========== */
const allImageSrcs = [];
Object.values(characters).forEach(ch => {
  ["front","back","side"].forEach(dir => {
    ch[dir].forEach(src => {
      if (!allImageSrcs.includes(src)) allImageSrcs.push(src);
    });
  });
});

let preloadCount = 0;
const preloadTotal = allImageSrcs.length;

function updateStartButton() {
  const btn = document.getElementById("startBtn");
  if (preloadCount >= preloadTotal) {
    imagesReady = true;
    btn.disabled = false;
    btn.textContent = "Enter World";
  } else {
    btn.disabled = true;
    btn.textContent = "Loading sprites... (" + preloadCount + "/" + preloadTotal + ")";
  }
}

function preloadAll() {
  updateStartButton();
  allImageSrcs.forEach(src => {
    const img = new Image();
    img.onload = () => {
      imageCache[src] = img;
      preloadCount++;
      updateStartButton();
    };
    img.onerror = () => {
      preloadCount++;
      updateStartButton();
      console.warn("Failed to load:", src);
    };
    img.src = src;
  });
}

preloadAll();

/* ========== PLAYER STATE ========== */
let myPlayer = {
  x: 350, y: 250, frame: 0,
  facingLeft: false, currentDir: "front",
  name: "", character: "original"
};

const otherPlayers = {};

/* ========== UI FUNCTIONS ========== */
function selectChar(el) {
  document.querySelectorAll(".char-option").forEach(e => e.classList.remove("selected"));
  el.classList.add("selected");
}

function startGame() {
  const input = document.getElementById("nameInput");
  const name = input.value.trim();

  if (!name) {
    input.classList.add("error");
    input.placeholder = "Name is required!";
    input.focus();
    setTimeout(() => input.classList.remove("error"), 500);
    return;
  }

  if (!imagesReady) return;

  myPlayer.name = name.substring(0, 15);
  myPlayer.character = document.querySelector(".selected").dataset.char;

  document.getElementById("start-screen").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("chat-hint").style.display = "block";
  document.getElementById("player-count").style.display = "block";
  gameStarted = true;

  socket.emit("setPlayerData", {
    name: myPlayer.name,
    character: myPlayer.character
  });
}

document.getElementById("nameInput").addEventListener("keypress", (e) => {
  if (e.key === "Enter") startGame();
});

/* ========== SOCKET EVENTS ========== */
socket.on("currentPlayers", (players) => {
  Object.keys(players).forEach(id => {
    if (id !== socket.id) {
      otherPlayers[id] = players[id];
    }
  });
  updatePlayerCount();
});

socket.on("playerJoined", (player) => {
  if (player.id !== socket.id) {
    otherPlayers[player.id] = player;
    updatePlayerCount();
    addSystemMsg(player.name + " joined the world");
  }
});

socket.on("playerMoved", (player) => {
  if (player.id !== socket.id) {
    otherPlayers[player.id] = player;
  }
});

socket.on("playerUpdated", (player) => {
  if (player.id !== socket.id) {
    otherPlayers[player.id] = player;
  }
});

socket.on("playerDisconnected", (id) => {
  const p = otherPlayers[id];
  delete otherPlayers[id];
  updatePlayerCount();
  if (p) addSystemMsg(p.name + " left the world");
});

socket.on("chatHistory", (history) => {
  history.forEach(addMessage);
});

socket.on("chatMessage", (msg) => {
  addMessage(msg);
});

function updatePlayerCount() {
  const count = 1 + Object.keys(otherPlayers).length;
  document.getElementById("player-count").textContent = "Players online: " + count;
}

/* ========== CHAT ========== */
const messagesDiv = document.getElementById("messages");
const chatInput = document.getElementById("chatInput");

function addMessage(msg) {
  const div = document.createElement("div");
  div.style.marginBottom = "6px";
  div.innerHTML = `<b style="color:${msg.id === socket.id ? '#4ade80' : '#aaa'}">${escapeHtml(msg.name)}:</b> ${escapeHtml(msg.text)}`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function addSystemMsg(text) {
  const div = document.createElement("div");
  div.style.marginBottom = "6px";
  div.style.color = "#888";
  div.style.fontStyle = "italic";
  div.style.fontSize = "12px";
  div.textContent = text;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

chatInput.addEventListener("focus", () => { chatFocused = true; });
chatInput.addEventListener("blur", () => { chatFocused = false; });

chatInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    const text = chatInput.value.trim();
    if (text) {
      socket.emit("chatMessage", text);
      chatInput.value = "";
      chatInput.blur();
    }
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !chatFocused && gameStarted) {
    chatInput.focus();
    e.preventDefault();
  }
});

/* ========== INPUT ========== */
document.addEventListener("keydown", (e) => {
  if (chatFocused) return;
  const k = e.key.toLowerCase();
  if (k === "arrowup" || k === "w") { keys["w"] = true; e.preventDefault(); }
  if (k === "arrowdown" || k === "s") { keys["s"] = true; e.preventDefault(); }
  if (k === "arrowleft" || k === "a") { keys["a"] = true; e.preventDefault(); }
  if (k === "arrowright" || k === "d") { keys["d"] = true; e.preventDefault(); }
});

document.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();
  if (k === "arrowup" || k === "w") keys["w"] = false;
  if (k === "arrowdown" || k === "s") keys["s"] = false;
  if (k === "arrowleft" || k === "a") keys["a"] = false;
  if (k === "arrowright" || k === "d") keys["d"] = false;
});

function bindMobile(btnId, key) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  const press = (e) => { if(e.cancelable) e.preventDefault(); keys[key] = true; btn.classList.add("pressed"); };
  const release = (e) => { if(e.cancelable) e.preventDefault(); keys[key] = false; btn.classList.remove("pressed"); };
  btn.addEventListener("touchstart", press, {passive: false});
  btn.addEventListener("touchend", release, {passive: false});
  btn.addEventListener("touchcancel", release, {passive: false});
  btn.addEventListener("mousedown", press);
  btn.addEventListener("mouseup", release);
  btn.addEventListener("mouseleave", release);
}

bindMobile("up", "w");
bindMobile("down", "s");
bindMobile("left", "a");
bindMobile("right", "d");

/* ========== GAME LOGIC ========== */
function update() {
  if (!gameStarted) return;

  let dx = 0, dy = 0;
  if (keys["w"]) dy -= 1;
  if (keys["s"]) dy += 1;
  if (keys["a"]) dx -= 1;
  if (keys["d"]) dx += 1;

  const moving = dx !== 0 || dy !== 0;

  if (moving) {
    const len = Math.hypot(dx, dy);
    dx = (dx / len) * MOVE_SPEED;
    dy = (dy / len) * MOVE_SPEED;

    myPlayer.x += dx;
    myPlayer.y += dy;

    myPlayer.x = Math.max(0, Math.min(CANVAS_W - SPRITE_WIDTH, myPlayer.x));
    myPlayer.y = Math.max(GROUND_OFFSET, Math.min(CANVAS_H, myPlayer.y));

    if (dy < 0) myPlayer.currentDir = "back";
    else if (dy > 0) myPlayer.currentDir = "front";
    else myPlayer.currentDir = "side";

    myPlayer.facingLeft = dx < 0;

    animationTimer++;
    if (animationTimer >= FRAME_DELAY) {
      myPlayer.frame = (myPlayer.frame + 1) % 4;
      animationTimer = 0;
    }
  } else {
    myPlayer.frame = 0;
    animationTimer = 0;
  }

  socket.volatile.emit("playerMovement", {
    x: myPlayer.x,
    y: myPlayer.y,
    frame: myPlayer.frame,
    facingLeft: myPlayer.facingLeft,
    currentDir: myPlayer.currentDir
  });
}

function getFrames(player) {
  const ch = characters[player.character] || characters.original;
  if (player.currentDir === "back") return ch.back;
  if (player.currentDir === "side") return ch.side;
  return ch.front;
}

function drawPlayer(player, isLocal) {
  const frames = getFrames(player);
  const src = frames[player.frame];
  if (!src) return;

  let img = getImage(src);
  if (!img) {
    const fallbackSrc = frames[0];
    if (fallbackSrc) img = getImage(fallbackSrc);
  }
  if (!img || !img.complete || img.naturalWidth === 0) return;

  if (player.character === "blue") {
    const processed = makeBlackTransparent(img);
    if (processed) img = processed;
  }

  const drawX = Math.round(player.x);
  const drawY = Math.round(player.y - GROUND_OFFSET);

  ctx.save();
  if (player.facingLeft) {
    ctx.translate(drawX + SPRITE_WIDTH, drawY);
    ctx.scale(-1, 1);
    ctx.drawImage(img, 0, 0, SPRITE_WIDTH, SPRITE_HEIGHT);
  } else {
    ctx.drawImage(img, drawX, drawY, SPRITE_WIDTH, SPRITE_HEIGHT);
  }
  ctx.restore();

  const name = (player.name || "Player").substring(0, 15);
  ctx.font = "bold 13px Arial";
  ctx.textAlign = "center";
  const mw = ctx.measureText(name).width;
  const tx = drawX + SPRITE_WIDTH / 2;
  const ty = drawY - 8;

  ctx.fillStyle = "rgba(0,0,0,0.65)";
  ctx.beginPath();
  ctx.roundRect(tx - mw/2 - 5, ty - 13, mw + 10, 18, 4);
  ctx.fill();

  ctx.fillStyle = isLocal ? "#4ade80" : "#fff";
  ctx.fillText(name, tx, ty);
}

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.strokeStyle = "#252525";
  ctx.lineWidth = 1;
  for (let x = 0; x <= CANVAS_W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
  }
  for (let y = 0; y <= CANVAS_H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
  }

  const all = [myPlayer, ...Object.values(otherPlayers)];
  all.sort((a, b) => a.y - b.y);
  all.forEach(p => drawPlayer(p, p.id === socket.id));
}

/* ========== LOOP ========== */
let lastTime = 0;
const STEP = 1000 / 60;

function loop(timestamp) {
  requestAnimationFrame(loop);
  const delta = timestamp - lastTime;
  if (delta < STEP) return;
  lastTime = timestamp - (delta % STEP);
  update();
  draw();
}
requestAnimationFrame(loop);

/* ========== RESPONSIVE CANVAS ========== */
function fitCanvas() {
  const scale = Math.min(window.innerWidth / CANVAS_W, window.innerHeight / CANVAS_H);
  const w = Math.floor(CANVAS_W * scale);
  const h = Math.floor(CANVAS_H * scale);
  canvas.style.width = w + "px";
  canvas.style.height = h + "px";
}
window.addEventListener("resize", fitCanvas);
fitCanvas();
</script>

</body>
</html>
