<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Pixel RPG</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:#111;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

canvas{
  background:#1a1a1a;
  image-rendering:pixelated;
  max-width:100vw;
  max-height:100vh;
}

#start-screen{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:#222;
  padding:30px;
  border-radius:12px;
  color:white;
  text-align:center;
  z-index:100;
  box-shadow:0 10px 40px rgba(0,0,0,0.45);
}

.char-option{
  display:inline-block;
  margin:10px;
  border:3px solid transparent;
  border-radius:10px;
  padding:8px;
  cursor:pointer;
  user-select:none;
}

.char-option:hover{
  background:#2d2d2d;
}

.selected{
  border-color:#4ade80;
}

input{
  padding:10px;
  width:220px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
  font-size:16px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  background:#4ade80;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}

#chat{
  position:absolute;
  left:10px;
  bottom:10px;
  width:300px;
  background:rgba(0,0,0,0.85);
  padding:10px;
  border-radius:10px;
  display:none;
}

#messages{
  height:180px;
  overflow-y:auto;
  color:white;
  margin-bottom:8px;
  font-size:14px;
}

#chatInput{
  width:100%;
}

#mobile-controls{
  position:absolute;
  bottom:20px;
  right:20px;
  display:none;
  z-index:999;
}

.control-row{
  display:flex;
  justify-content:center;
}

.ctrl{
  width:70px;
  height:70px;
  margin:5px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.2);
  color:white;
  font-size:28px;
  backdrop-filter:blur(4px);
}

.ctrl:active{
  background:#4ade80;
}

@media (max-width: 900px){
  #mobile-controls{
    display:block;
  }
}
</style>
</head>

<body>

<canvas id="game" width="800" height="600"></canvas>

<div id="start-screen">
  <h2>Choose Character</h2>

  <div class="char-option selected" data-char="original">
    <img src="frontwalk_1.png" width="64" alt="Black Suit"><br>
    Black Suit
  </div>

  <div class="char-option" data-char="blue">
    <img src="bluefront1.png" width="64" alt="Blue Vest"><br>
    Blue Vest
  </div>

  <br>
  <input id="nameInput" maxlength="15" value="Player">
  <br>
  <button onclick="startGame()">Start Game</button>
</div>

<div id="chat">
  <div id="messages"></div>
  <input id="chatInput" placeholder="Type message...">
</div>

<div id="mobile-controls">
  <div class="control-row">
    <button class="ctrl" id="up">⬆</button>
  </div>
  <div class="control-row">
    <button class="ctrl" id="left">⬅</button>
    <button class="ctrl" id="down">⬇</button>
    <button class="ctrl" id="right">➡</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const socket = io();
const keys = {};

const SPRITE_WIDTH = 64;
const SPRITE_HEIGHT = 160;
const MOVE_SPEED = 2.4;
const FRAME_DELAY = 10;
const GROUND_OFFSET = 64;

let animationTimer = 0;
let gameStarted = false;
let mySocketId = null;

function loadSprites(prefix, underscore=true){
  return Array.from({length:4}, (_, i) => {
    const img = new Image();
    img.src = underscore ? `${prefix}_${i + 1}.png` : `${prefix}${i + 1}.png`;
    return img;
  });
}

const characters = {
  original:{
    front:loadSprites("frontwalk", true),
    back:loadSprites("backwalk", true),
    side:loadSprites("rightwalk", true)
  },
  blue:{
    front:loadSprites("bluefront", false),
    back:loadSprites("blueback", false),
    side:loadSprites("blueright", false)
  }
};

const processedImages = new Map();

function makeBlackTransparent(img){
  if(processedImages.has(img.src)){
    return processedImages.get(img.src);
  }

  const off = document.createElement("canvas");
  off.width = img.naturalWidth || img.width || SPRITE_WIDTH;
  off.height = img.naturalHeight || img.height || SPRITE_HEIGHT;

  const offCtx = off.getContext("2d");
  offCtx.drawImage(img, 0, 0);

  const imageData = offCtx.getImageData(0, 0, off.width, off.height);
  const data = imageData.data;

  for(let i = 0; i < data.length; i += 4){
    if(data[i] < 12 && data[i + 1] < 12 && data[i + 2] < 12){
      data[i + 3] = 0;
    }
  }

  offCtx.putImageData(imageData, 0, 0);
  processedImages.set(img.src, off);
  return off;
}

let myPlayer = {
  id:null,
  x:350,
  y:250,
  frame:0,
  facingLeft:false,
  currentDir:"front",
  name:"Player",
  character:"original",
  ready:false
};

const otherPlayers = {};

function isMe(id){
  return id && id === mySocketId;
}

function mergePlayerFromServer(player){
  if(!player || !player.id) return;

  if(isMe(player.id)){
    myPlayer = {
      ...myPlayer,
      ...player,
      id: player.id
    };

    delete otherPlayers[player.id];
    return;
  }

  otherPlayers[player.id] = {
    ...(otherPlayers[player.id] || {}),
    ...player
  };
}

function removeWrongSelfFromOthers(){
  if(mySocketId && otherPlayers[mySocketId]){
    delete otherPlayers[mySocketId];
  }
}

socket.on("connect", () => {
  mySocketId = socket.id;
  myPlayer.id = socket.id;
  removeWrongSelfFromOthers();
});

socket.on("youAre", (id) => {
  mySocketId = id;
  myPlayer.id = id;
  removeWrongSelfFromOthers();
});

function startGame(){
  const selectedCharacter = document.querySelector(".char-option.selected").dataset.char;
  const selectedName = document.getElementById("nameInput").value.trim() || "Player";

  myPlayer.name = selectedName;
  myPlayer.character = selectedCharacter;
  myPlayer.ready = true;
  gameStarted = true;

  document.getElementById("start-screen").style.display = "none";
  document.getElementById("chat").style.display = "block";

  socket.emit("setPlayerData", {
    name: selectedName,
    character: selectedCharacter
  });
}

document.querySelectorAll(".char-option").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll(".char-option").forEach(e => e.classList.remove("selected"));
    el.classList.add("selected");
  });
});

socket.on("currentPlayers", (players) => {
  Object.values(players).forEach(mergePlayerFromServer);
  removeWrongSelfFromOthers();
});

socket.on("playerJoined", (player) => {
  mergePlayerFromServer(player);
});

socket.on("playerUpdated", (player) => {
  mergePlayerFromServer(player);
});

socket.on("playerMoved", (player) => {
  mergePlayerFromServer(player);
});

socket.on("playerDisconnected", (id) => {
  delete otherPlayers[id];
});

socket.on("chatHistory", (history) => {
  history.forEach(addMessage);
});

socket.on("chatMessage", (msg) => {
  addMessage(msg);
});

function addMessage(msg){
  const div = document.createElement("div");
  div.textContent = `${msg.name}: ${msg.text}`;
  div.style.marginBottom = "5px";

  if(msg.id === mySocketId){
    div.style.color = "#4ade80";
  }

  document.getElementById("messages").appendChild(div);
  div.scrollIntoView();
}

document.getElementById("chatInput").addEventListener("keypress", (e) => {
  if(e.key === "Enter"){
    const text = e.target.value.trim();
    if(text){
      socket.emit("chatMessage", text);
      e.target.value = "";
    }
  }
});

function bindMobile(btn, key){
  const el = document.getElementById(btn);

  el.addEventListener("touchstart", (e) => {
    e.preventDefault();
    keys[key] = true;
  }, { passive:false });

  el.addEventListener("touchend", (e) => {
    e.preventDefault();
    keys[key] = false;
  }, { passive:false });

  el.addEventListener("touchcancel", (e) => {
    e.preventDefault();
    keys[key] = false;
  }, { passive:false });
}

bindMobile("up", "w");
bindMobile("down", "s");
bindMobile("left", "a");
bindMobile("right", "d");

function update(){
  if(!gameStarted){
    return;
  }

  let dx = 0;
  let dy = 0;

  if(keys["w"] || keys["arrowup"]) dy -= 1;
  if(keys["s"] || keys["arrowdown"]) dy += 1;
  if(keys["a"] || keys["arrowleft"]) dx -= 1;
  if(keys["d"] || keys["arrowright"]) dx += 1;

  const moving = dx !== 0 || dy !== 0;

  if(moving){
    const len = Math.hypot(dx, dy);
    dx = (dx / len) * MOVE_SPEED;
    dy = (dy / len) * MOVE_SPEED;

    myPlayer.x += dx;
    myPlayer.y += dy;

    if(dy < 0){
      myPlayer.currentDir = "back";
    }else if(dy > 0){
      myPlayer.currentDir = "front";
    }else{
      myPlayer.currentDir = "side";
    }

    if(dx !== 0){
      myPlayer.facingLeft = dx < 0;
    }

    animationTimer++;

    if(animationTimer >= FRAME_DELAY){
      myPlayer.frame = (myPlayer.frame + 1) % 4;
      animationTimer = 0;
    }
  }else{
    myPlayer.frame = 0;
  }

  // Movement sends ONLY movement.
  // It does NOT send character/name, so it cannot overwrite the chosen skin.
  socket.volatile.emit("playerMovement", {
    x: myPlayer.x,
    y: myPlayer.y,
    frame: myPlayer.frame,
    facingLeft: myPlayer.facingLeft,
    currentDir: myPlayer.currentDir
  });
}

function getFrames(player){
  const char = characters[player.character] || characters.original;

  if(player.currentDir === "back"){
    return char.back;
  }

  if(player.currentDir === "side"){
    return char.side;
  }

  return char.front;
}

function drawPlayer(player){
  if(!player) return;

  const frames = getFrames(player);
  let img = frames[player.frame || 0];

  if(!img || !img.complete) return;

  if(player.character === "blue"){
    img = makeBlackTransparent(img);
  }

  const drawX = Math.round(player.x);
  const drawY = Math.round(player.y - GROUND_OFFSET);

  if(player.facingLeft){
    ctx.save();
    ctx.scale(-1, 1);
    ctx.drawImage(img, -drawX - SPRITE_WIDTH, drawY, SPRITE_WIDTH, SPRITE_HEIGHT);
    ctx.restore();
  }else{
    ctx.drawImage(img, drawX, drawY, SPRITE_WIDTH, SPRITE_HEIGHT);
  }

  ctx.fillStyle = "white";
  ctx.font = "bold 14px Arial";
  ctx.textAlign = "center";
  ctx.fillText(player.name || "Player", drawX + SPRITE_WIDTH / 2, drawY - 10);
}

function draw(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  Object.values(otherPlayers).forEach(player => {
    if(player.ready){
      drawPlayer(player);
    }
  });

  if(gameStarted){
    drawPlayer(myPlayer);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown", (e) => {
  const tag = document.activeElement.tagName.toLowerCase();

  if(tag === "input"){
    return;
  }

  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", (e) => {
  keys[e.key.toLowerCase()] = false;
});

loop();
</script>
</body>
</html>
